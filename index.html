<!DOCTYPE html>
<html lang="en-US">

    <!-- <head> informacion no visible -->
    <head>
        <title>CSS 132</title>

        <!-- CSS Externo / External CSS  -->
        <link rel="stylesheet" href="css/styles.css">
        

        <!-- CSS Interno / Internal CSS -->

        <!-- Atajo para hacer comentarios HTML 
            Ctrl + / 
        -->
        
    </head>


    <!-- <body> informacion visible -->
    <body>

        <!-- Encabezado -->
        <header>            
            <!-- Navegacion -->
            <nav></nav>
        </header>



        <!-- Contenido principal -->
        <main>
            <!--

                <p id="muestra">Muestra box model</p>
            </section>
             -->
            
            <section>
                <!-- Clases e ids -->
                <h2>Galeria de ciudades</h2>
                <div class="ciudad" id="london">
                    <div class="ciudad-texto">
                        <h2>London</h2>
                        <p>London is the capital city of England.</p>
                        <p class="descripcion2">London has over 9 million inhabitants.</p>
                    </div>
                </div>


                <div class="ciudad" id="oslo">
                    <div class="ciudad-texto">
                        <h2>Oslo</h2>
                        <p>Oslo is the capital city of Norway.</p>
                        <p class="descripcion2">Oslo has over 700,000 inhabitants.</p>
                    </div>
                </div>

                <div class="ciudad" id="rome">
                    <div class="ciudad-texto">
                        <h2>Rome</h2>
                        <p>Rome is the capital city of Italy.</p>
                        <p class="descripcion2">Rome has over 4 million inhabitants.</p>
                    </div>
                </div>

            </section>

        </main>


        <!-- Pie de pagina -->
        <footer></footer>

    </body>
